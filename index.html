<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR تهنئة علويتي</title>
  <style>
    :root {
      --bg1: #0b1022;
      --bg2: #1f2a5c;
      --pink: #ff4d8d;
      --gold: #f59e0b;
      --text: #f8fafc;
      --muted: #cbd5e1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background:
        radial-gradient(900px 600px at 10% 10%, #273c9b 0%, transparent 45%),
        radial-gradient(900px 600px at 90% 15%, #7c2dbd 0%, transparent 45%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      padding: 20px;
    }

    .card {
      width: min(94vw, 560px);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      padding: 20px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.35rem;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.8;
    }

    .input-wrap {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
      text-align: right;
    }

    input {
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      outline: none;
    }

    input::placeholder {
      color: #dbeafe;
    }

    .actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      color: #111827;
      background: linear-gradient(135deg, #fde68a, var(--gold));
      box-shadow: 0 8px 20px rgba(245, 158, 11, 0.35);
    }

    button.secondary {
      background: linear-gradient(135deg, #ffc1d8, var(--pink));
      box-shadow: 0 8px 20px rgba(255, 77, 141, 0.35);
    }

    .qr-box {
      margin: 10px auto 0;
      width: 340px;
      max-width: 100%;
      background: #fff;
      border-radius: 18px;
      padding: 14px;
      box-shadow: inset 0 0 0 1px #f1f5f9;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
    }

    .note {
      margin-top: 12px;
      font-size: 0.9rem;
      color: #e2e8f0;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>QR Code لتهنئة علويتي 💖</h1>
    <p>ضع رابط صفحة التهنئة أو نص الرسالة، ثم اضغط توليد.</p>

    <div class="input-wrap">
      <input id="qrText" type="text" placeholder="ضع الرابط هنا..."
             value="https://warithh.github.io/eid-greeting-alawiti/tehneah.html" />
    </div>

    <div class="actions">
      <button id="generateBtn">توليد QR</button>
      <button class="secondary" id="downloadBtn">تحميل الصورة</button>
    </div>

    <div class="qr-box">
      <canvas id="qrCanvas" width="700" height="700"></canvas>
    </div>

    <div class="note">تم تصميم القلب بحجم آمن للمسح.</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script>
    const qrTextInput = document.getElementById("qrText");
    const qrCanvas = document.getElementById("qrCanvas");
    const generateBtn = document.getElementById("generateBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    function drawHeartCentered(ctx, size, cx, cy) {
      const bgRadius = size * 0.72;
      ctx.beginPath();
      ctx.arc(cx, cy, bgRadius, 0, Math.PI * 2);
      ctx.fillStyle = "white";
      ctx.fill();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(size / 100, size / 100);

      ctx.beginPath();
      // Symmetric heart path centered around (0, 0).
      ctx.moveTo(0, -10);
      ctx.bezierCurveTo(-32, -40, -60, -5, 0, 45);
      ctx.bezierCurveTo(60, -5, 32, -40, 0, -10);
      ctx.closePath();

      const grad = ctx.createLinearGradient(-60, -45, 60, 50);
      grad.addColorStop(0, "#ff84b7");
      grad.addColorStop(1, "#ff2f75");
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(-13, -12, 10, 6, -0.5, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.fill();

      ctx.restore();
    }

    async function generateQR() {
      const text = qrTextInput.value.trim();
      if (!text) return;

      await QRCode.toCanvas(qrCanvas, text, {
        width: 700,
        margin: 2,
        errorCorrectionLevel: "H",
        color: {
          dark: "#0f172a",
          light: "#ffffff"
        }
      });

      const ctx = qrCanvas.getContext("2d");
      const centerX = qrCanvas.width / 2;
      const centerY = qrCanvas.height / 2;
      const heartSize = qrCanvas.width * 0.16;

      drawHeartCentered(ctx, heartSize, centerX, centerY);
    }

    function downloadQR() {
      const link = document.createElement("a");
      link.href = qrCanvas.toDataURL("image/png");
      link.download = "qr-alawiti-heart.png";
      link.click();
    }

    generateBtn.addEventListener("click", generateQR);
    downloadBtn.addEventListener("click", downloadQR);
    generateQR();
  </script>
</body>
</html>
